<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC 組裝規格與預算計算器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ PC 組裝規格與預算計算器</h1>
        </header>

        <main>
            <form id="pc-form">
                <div class="row">
                    <label>CPU</label>
                    <select id="cpu-select"><option value="">-- 請選擇 CPU --</option></select>
                </div>
                <div class="row">
                    <label>顯示卡 (GPU)</label>
                    <select id="gpu-select"><option value="">-- 請選擇 GPU --</option></select>
                </div>
                <div class="row">
                    <label>記憶體 (RAM)</label>
                    <select id="ram-select"><option value="">-- 請選擇 RAM --</option></select>
                </div>
                <div class="row">
                    <label>儲存 (Storage)</label>
                    <select id="storage-select"><option value="">-- 請選擇 Storage --</option></select>
                </div>
                <div class="row">
                    <label>電源供應器 (PSU)</label>
                    <select id="psu-select"><option value="">-- 請選擇 PSU --</option></select>
                </div>

                <div class="summary">
                    <div>總金額: <span id="total-price">0</span> 元</div>
                    <div>預估功耗: <span id="total-watt">0</span> W</div>
                    <div id="compatibility" style="color: #b00;"></div>
                </div>

                <div class="actions">
                    <button type="button" id="calculate-btn">計算</button>
                    <button type="button" id="save-btn">儲存到 Google 試算表</button>
                </div>
            </form>
        </main>

        <footer>
            <small>請在 `app.js` 設定 `GOOGLE_SHEETS_SCRIPT_URL` 為你的 GAS Web App URL</small>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
