<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC 組裝規格與預算計算器</title>
    <link rel="stylesheet" href="styles.css?v=20260616-4">
</head>
<body>
    <div class="container">
        <header>
            <h1>🖥️ PC 組裝規格與預算計算器</h1>
        </header>

        <main>
            <form id="pc-form">
                <div class="row">
                    <label>CPU</label>
                    <select id="cpu-select">
                        <option value="">-- 請選擇 CPU --</option>
                        <option value="0">Intel i5-12400 - 5,500 元</option>
                        <option value="1">Intel i7-12700 - 11,000 元</option>
                        <option value="2">Intel i9-12900 - 18,500 元</option>
                        <option value="3">AMD Ryzen 5 5600 - 5,000 元</option>
                        <option value="4">AMD Ryzen 7 5800X - 12,000 元</option>
                    </select>
                </div>
                <div class="row">
                    <label>顯示卡 (GPU)</label>
                    <select id="gpu-select">
                        <option value="">-- 請選擇 GPU --</option>
                        <option value="0">NVIDIA GTX 1660 - 6,500 元</option>
                        <option value="1">NVIDIA RTX 3060 - 12,000 元</option>
                        <option value="2">NVIDIA RTX 4060 - 17,000 元</option>
                        <option value="3">NVIDIA RTX 4070 - 26,000 元</option>
                        <option value="4">AMD RX 6600 - 8,000 元</option>
                    </select>
                </div>
                <div class="row">
                    <label>記憶體 (RAM)</label>
                    <select id="ram-select">
                        <option value="">-- 請選擇 RAM --</option>
                        <option value="0">16GB (2x8GB) - 1,200 元</option>
                        <option value="1">32GB (2x16GB) - 2,600 元</option>
                    </select>
                </div>
                <div class="row">
                    <label>儲存 (Storage)</label>
                    <select id="storage-select">
                        <option value="">-- 請選擇 Storage --</option>
                        <option value="0">SSD 500GB - 1,200 元</option>
                        <option value="1">SSD 1TB - 2,000 元</option>
                        <option value="2">SSD 2TB - 3,600 元</option>
                    </select>
                </div>
                <div class="row">
                    <label>電源供應器 (PSU)</label>
                    <select id="psu-select">
                        <option value="">-- 請選擇 PSU --</option>
                        <option value="0">450W - 1,400 元</option>
                        <option value="1">500W - 1,500 元</option>
                        <option value="2">550W - 1,600 元</option>
                        <option value="3">650W - 2,200 元</option>
                        <option value="4">750W - 3,000 元</option>
                        <option value="5">850W - 3,800 元</option>
                    </select>
                </div>

                <div class="summary">
                    <div>總金額: <span id="total-price">0</span> 元</div>
                    <div>預估功耗: <span id="total-watt">0</span> W</div>
                    <div id="compatibility" style="color: #b00;"></div>
                </div>

                <div class="actions">
                    <button type="button" id="calculate-btn">計算</button>
                    <button type="button" id="save-btn">儲存到 Google 試算表</button>
                </div>
            </form>
        </main>

        <footer>
            <small>請在 `app.js` 設定 `GOOGLE_SHEETS_SCRIPT_URL` 為你的 GAS Web App URL</small>
        </footer>
    </div>

    <script src="app.js?v=20260616-4"></script>
</body>
</html>
